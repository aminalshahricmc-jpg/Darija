<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Povlačenje sredstava</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:white;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
border:2px solid gold;
border-radius:20px;
padding:25px;
}

h1{
text-align:center;
color:gold;
margin-bottom:20px;
}

input, select{
width:100%;
padding:14px;
margin-top:14px;
border:2px solid gold;
border-radius:12px;
font-size:15px;
outline:none;
}

.amount{
font-size:34px;
font-weight:bold;
color:black;
text-align:center;
margin:25px 0;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:gold;
color:white;
font-size:16px;
font-weight:600;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:25px;
border-radius:20px;
border:2px solid gold;
text-align:center;
width:90%;
max-width:300px;
}

.popup-content p{
color:gold;
font-weight:bold;
margin-bottom:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>Povlačenje sredstava</h1>

<input type="text" placeholder="Broj bankovnog računa">

<input type="text" placeholder="Ime računa">

<select>
<option>Banca Intesa</option>
<option>Komercijalna Banka</option>
<option>Raiffeisen Bank</option>
<option>UniCredit Bank</option>
<option>AIK Banka</option>
<option>OTP Banka Srbija</option>
<option>Eurobank Direktna</option>
<option>Addiko Bank</option>
<option>Poštanska Štedionica</option>
<option>NLB Komercijalna Banka</option>
<option>Erste Bank</option>
<option>ProCredit Bank</option>
<option>Srpska Banka</option>
</select>

<div class="amount">12,000,000 RSD</div>

<button onclick="showPopup()">Povuci sredstva</button>

<button onclick="location.href='homepage.html'">Povratak</button>

</div>

<div class="popup" id="popup">
<div class="popup-content">
<p>Aktivirajte račun prije povlačenja sredstava</p>
<button onclick="closePopup()">OK</button>
</div>
</div>

<script>
function showPopup(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
